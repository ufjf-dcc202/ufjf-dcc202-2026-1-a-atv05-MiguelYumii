<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="inicio.css">
    <title>Listas - Exemplos</title>
</head>
<body>
    <section class="Header_PAGINA">
        <div>
            <h1 class="Titulo_SACRILEGIO">Listas</h1>
            <h2 class="Titulo_RPG">Exemplos</h2>
        </div>
    </section>

    <div class="Nav_Button_Container">
        <a href="index.html" class="Btn_ESTILO">Voltar</a>
    </div>

    <main style="margin: 3% 7%; color:#fff;">
        <h2>Lista ordenada</h2>
        <ol>
            <li>Primeiro item</li>
            <li>Segundo item</li>
            <li>Terceiro item</li>
        </ol>


        <h2>Lista não ordenada</h2>
        <ul>
            <li>Item A</li>
            <li>Item B</li>
            <li>Item C</li>
        </ul>


        <h2>Lista de definição</h2>
        <dl>
            <dt>HTML</dt>
            <dd>Linguagem base dos sites</dd>

            <dt>CSS</dt>
            <dd>estilização dos sites</dd>

            <dt>JavaScript</dt>
            <dd>linguagem pra deixar as paradas mais interativas e etc</dd>
        </dl>
    </main>

</body>
</html>
